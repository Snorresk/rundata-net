# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - rundatanet-sk

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-template.yml

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write   # required by azure/login for OIDC federated auth
      contents: read # This is required for actions/checkout

    # One-time Azure App Service configuration required for this deploy flow
    # (set via Portal → Configuration, or `az webapp config ...`):
    #   * App settings:
    #       SCM_DO_BUILD_DURING_DEPLOYMENT = 0   (disable Oryx build; artifact already contains antenv/)
    #       POST_BUILD_COMMAND             = (remove; migrate now runs from startup.sh)
    #   * General settings:
    #       Startup Command                = startup.sh
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4895EBF5D3AE4BDC820440B298035364 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3999A98BF6384395B5406423B47C8F35 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_41AA8B472AD34FB39D78B7031B76D13A }}

      # Deploy the zip directly; no need to unpack it on the runner.
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'rundatanet-sk'
          slot-name: 'Production'
          package: release.zip
